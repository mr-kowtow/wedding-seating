<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manny &amp; Harshaan — Seating</title>
<meta name="theme-color" content="#FAF7F1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #B8A98A;
    --sage-light: #FAF8F4;
    --sage-dark: #7A6A52;
    --terra: #C0392B;
    --terra-light: #FDF2F1;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --text-hint: #AAAAAA;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.13);
    --surface: #FFFFFF;
    --surface-2: #F8F7F5;
    --radius: 10px;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--surface-2);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 0 3rem;
    background: var(--surface);
    box-shadow: 0 1px 20px rgba(0,0,0,0.06);
  }

  /* Header */
  .hero {
    text-align: center;
    padding: 2.75rem 1.5rem 2.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
  }
  .hero::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--sage), transparent);
    position: absolute;
    top: 0; left: 0; right: 0;
    opacity: 0.6;
  }
  .hero-eyebrow {
    font-family: var(--font-sans);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .hero h1 {
    font-family: var(--font-serif);
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .hero-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 8px;
    color: var(--text-hint);
    font-size: 13px;
  }
  .hero-divider::before,
  .hero-divider::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--border-strong);
  }
  .hero-date {
    font-family: var(--font-serif);
    font-size: 15px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Search */
  .search-section {
    padding: 1.25rem 1.25rem 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .search-box {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-hint);
    pointer-events: none;
    font-size: 15px;
  }
  .search-box input {
    width: 100%;
    font-size: 16px;
    font-family: var(--font-sans);
    padding: 12px 14px 12px 40px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-box input:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(107,140,110,0.15);
    background: var(--surface);
  }
  .search-box input::placeholder { color: var(--text-hint); }

  /* Result */
  .result {
    margin: 1.25rem 1.25rem 0;
    padding: 1.25rem 1.5rem;
    border-radius: var(--radius);
    border: 1px solid var(--sage);
    background: var(--sage-light);
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .result.not-found {
    border-color: var(--terra);
    background: var(--terra-light);
  }
  .result-name {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .result-table-num {
    font-family: var(--font-serif);
    font-size: 48px;
    font-weight: 600;
    color: var(--sage-dark);
    line-height: 1;
    margin: 4px 0 2px;
  }
  .result-label {
    font-size: 13px;
    color: var(--sage-dark);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .result-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .not-found-msg {
    font-size: 15px;
    color: var(--terra);
    font-weight: 500;
  }
  .not-found-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Section heading */
  .section-heading {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
    padding: 1.5rem 1.25rem 0.6rem;
  }

  /* Table cards */
  .tables-list {
    padding: 0 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .table-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .table-card.highlighted {
    border-color: var(--sage);
    box-shadow: 0 0 0 2px rgba(107,140,110,0.15);
  }
  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .table-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .table-num-badge {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .table-card.highlighted .table-num-badge {
    background: var(--sage);
    border-color: var(--sage);
    color: #fff;
  }
  .table-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .table-pax-badge {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
  }
  .table-chevron {
    font-size: 11px;
    color: var(--text-hint);
    transition: transform 0.2s;
  }
  .table-body {
    display: none;
    padding: 10px 14px 12px;
  }
  .table-body.open { display: block; }
  .guest-pill-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .guest-pill {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    transition: background 0.15s;
  }
  .guest-pill.match {
    background: var(--sage-light);
    border-color: var(--sage);
    color: var(--sage-dark);
    font-weight: 500;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 2rem 1.25rem 1rem;
    font-size: 12px;
    color: var(--text-hint);
    border-top: 1px solid var(--border);
    margin-top: 2rem;
  }
  .footer strong {
    font-family: var(--font-serif);
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="hero-eyebrow">Reception Seating</div>
    <h1>Manny &amp; Harshaan</h1>
    <div class="hero-divider">✦</div>
    <div class="hero-date">27 April 2026 &nbsp;·&nbsp; Rochford Wines, Yarra Valley</div>
  </div>

  <div class="search-section">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search"
        placeholder="Search your name…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
    </div>
  </div>

  <div class="result" id="result"></div>

  <div class="section-heading">All tables</div>
  <div class="tables-list" id="tables-list"></div>

  <div class="footer">
    <strong>Manny &amp; Harshaan</strong><br>
    27 April 2026 · Rochford Wines
  </div>

</div>

<script>
const TABLES = [
  {
    id: 1,
    label: "Table 1",
    pax: 30,
    guests: [
      "Rajesh","Mrs Randhir","Uncle Bhajan","Sunita","Avtar","Linder",
      "Ajit","Mrs Avtar","Pritam","Ravinder","Major Randhir","Bajan",
      "Suresh","Ajit's Son","Nash","Mrs Suresh","Parul","Uncle Jack",
      "Jaspal","Ms Nash","Mrs Jaspal","Mrs Jack","Dato Amar","Milind"
    ]
  },
  {
    id: 2,
    label: "Table 2",
    pax: 8,
    guests: ["Amrik","Bel","Hazel","Smeetha","Roshan","Sandesh","Jaimen"]
  },
  {
    id: 3,
    label: "Table 3",
    pax: 4,
    guests: ["Maanveer","Harshaan"]
  },
  {
    id: 4,
    label: "Table 4",
    pax: 10,
    guests: ["Ien","Nisha","Bryan","Lee Shien Yin","Ariele","Saniah","Chester","Annia"]
  },
  {
    id: 5,
    label: "Table 5",
    pax: 10,
    guests: ["Prisha","Sunil","Manraj","Tishal","Saina","Tianna","Kavita","Umeera"]
  },
  {
    id: 6,
    label: "Table 6",
    pax: 10,
    guests: ["Anil","Jasmail","Veerpaal","Pua Jasi","Pua Bheeray","Fefer Ajit","Fefer Chan"]
  },
  {
    id: 7,
    label: "Table 7",
    pax: 10,
    guests: ["Soo Yee","Ranjit","Yee Chian","Bhupi","Shyam","Pua Bindhe","Fefer Prem","Teji","Renu","Pooja"]
  },
  {
    id: 8,
    label: "Table 8",
    pax: 20,
    guests: [
      "Hajera","Jesse","Irwan","Rhys","Francine","Mrs Irwan",
      "Brianna","Bailey gf","Bailey","Navin","Mandeep","Bryan",
      "Ashweetha","David","Karan"
    ]
  }
];

function norm(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function buildTables() {
  const list = document.getElementById("tables-list");
  list.innerHTML = "";
  TABLES.forEach(t => {
    const card = document.createElement("div");
    card.className = "table-card";
    card.id = "tc-" + t.id;
    card.innerHTML = `
      <div class="table-header" onclick="toggleTable(${t.id})">
        <div class="table-header-left">
          <div class="table-num-badge">${t.id}</div>
          <span class="table-name">${t.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="table-pax-badge">${t.guests.length} guests</span>
          <span class="table-chevron" id="chev-${t.id}">▼</span>
        </div>
      </div>
      <div class="table-body" id="tb-${t.id}">
        <div class="guest-pill-wrap" id="pills-${t.id}">
          ${t.guests.map(g => `<span class="guest-pill" data-guest="${g}">${g}</span>`).join("")}
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleTable(id) {
  const body = document.getElementById("tb-" + id);
  const chev = document.getElementById("chev-" + id);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  chev.style.transform = isOpen ? "" : "rotate(180deg)";
}

function doSearch(q) {
  const resultEl = document.getElementById("result");
  const nq = norm(q.trim());

  if (!nq) {
    resultEl.style.display = "none";
    resultEl.className = "result";
    document.querySelectorAll(".table-card").forEach(c => {
      c.classList.remove("highlighted");
    });
    document.querySelectorAll(".guest-pill").forEach(p => p.classList.remove("match"));
    document.querySelectorAll(".table-body").forEach(b => {
      b.classList.remove("open");
    });
    document.querySelectorAll(".table-chevron").forEach(c => c.style.transform = "");
    return;
  }

  const matches = [];
  TABLES.forEach(t => {
    t.guests.forEach(g => {
      if (norm(g).includes(nq)) matches.push({ guest: g, table: t });
    });
  });

  document.querySelectorAll(".table-card").forEach(c => c.classList.remove("highlighted"));
  document.querySelectorAll(".guest-pill").forEach(p => p.classList.remove("match"));
  document.querySelectorAll(".table-body").forEach(b => b.classList.remove("open"));
  document.querySelectorAll(".table-chevron").forEach(c => c.style.transform = "");

  if (matches.length === 0) {
    resultEl.style.display = "block";
    resultEl.className = "result not-found";
    resultEl.innerHTML = `
      <div class="not-found-msg">No guest found for "${q.trim()}"</div>
      <div class="not-found-hint">Try a shorter name or check the spelling.</div>
    `;
    return;
  }

  const unique = [...new Map(matches.map(m => [m.guest + m.table.id, m])).values()];
  resultEl.style.display = "block";
  resultEl.className = "result";
  resultEl.innerHTML = unique.map(m => `
    <div class="result-name">${m.guest}</div>
    <div class="result-table-num">${m.table.label}</div>
    <div class="result-label">Your seat is at ${m.table.label}</div>
    <div class="result-detail">${m.table.pax}-person table</div>
  `).join('<hr style="margin:12px 0;border:none;border-top:0.5px solid rgba(29,158,117,0.3)">');

  const seenTables = new Set(unique.map(m => m.table.id));
  seenTables.forEach(id => {
    const card = document.getElementById("tc-" + id);
    if (card) {
      card.classList.add("highlighted");
      const body = document.getElementById("tb-" + id);
      const chev = document.getElementById("chev-" + id);
      if (body) { body.classList.add("open"); }
      if (chev) { chev.style.transform = "rotate(180deg)"; }
    }
  });

  matches.forEach(m => {
    const pill = document.querySelector(`#pills-${m.table.id} [data-guest="${m.guest}"]`);
    if (pill) pill.classList.add("match");
  });

  resultEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

document.getElementById("search").addEventListener("input", e => doSearch(e.target.value));

buildTables();
</script>
</body>
</html>
